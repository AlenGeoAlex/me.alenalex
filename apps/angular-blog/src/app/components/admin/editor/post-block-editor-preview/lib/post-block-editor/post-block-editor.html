<div class="flex flex-col w-full h-full overflow-hidden">
  @if (!editorInitialized()) {
    <div class="flex-1 flex flex-col items-center justify-center space-y-4 p-4 text-center">
      <div class="flex items-center space-x-2 text-surface-500 dark:text-surface-400">
        <i class="pi pi-cog pi-spin text-xl"></i>
        <span class="font-medium text-lg">Preparing the editor...</span>
      </div>
    </div>
  }
  <div
    [ngClass]="{ 'hidden': !editorInitialized() }"
    class="w-full h-full"
    id="editor-js"
    #editor
  ></div>
</div>
