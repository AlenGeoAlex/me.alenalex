<div class="w-full py-8 px-10 flex flex-col gap-0 divide-y divide-(--border)">
  <p-table [value]="postFileResource?.value() ?? []" styleClass="w-full table-fixed">
    <ng-template #header>
      <tr>
        <th class="px-4 py-2 w-[40%] text-left">File Name</th>
        <th class="px-4 py-2 w-[10%] text-left">Size</th>
        <th class="px-4 py-2 w-[15%] text-left">Type</th>
        <th class="px-4 py-2 w-[20%] text-left">Hash</th>
        <th class="px-4 py-2 w-[15%] text-left">Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-file>
      <tr>
        <td class="px-4 py-2">
          <div class="flex flex-row gap-1 w-full min-w-0">
            <div class="min-w-fit">
              @if (file.isOg)
              {
                <p-badge severity="info" value="Meta" [pTooltip]="'This is an Open Graph Image, Deleting this or mutating this is not possible without deleting the link'" />
              }
            </div>
            <div class="min-w-0 truncate" title="{{ file.name }}">
              {{ file.name }}
            </div>
          </div>
        </td>
        <td class="px-4 py-2">{{ file.size | filesize }}</td>
        <td class="px-4 py-2 truncate" title="{{ file.type }}">{{ file.type }}</td>
        <td class="px-4 py-2 max-w-30 truncate" title="{{ file.hash }}">
          {{ file.hash }}
        </td>
        <td class="px-4 py-2">
          <div class="flex gap-2">
            <p-button
              (click)="showPreview(file)"
              severity="secondary"
              size="small"
              [pTooltip]="'Preview'"
              icon="pi pi-eye"
            />
            <p-button
              severity="danger"
              [loading]="deletingIds().has(file.id)"
              [disabled]="file.isOg || deletingIds().has(file.id)"
              size="small"
              (click)="deleteFile(file)"
              [pTooltip]="'Delete'"
              icon="pi pi-trash"
            />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
