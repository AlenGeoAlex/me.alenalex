<div class="flex-1 flex flex-col min-h-0 w-full">
  <bloggi-post-editor-navbar
    [activeTab]="activeTab()"
    [editorDirty]="isEditorDirty()"
    [previewDirty]="isPreviewDirty()"
    [metadataDirty]="isMetadataDirty()"
    (tabChange)="onTabChange($event)"
  ></bloggi-post-editor-navbar>

  <div class="flex-1 flex flex-col overflow-hidden min-h-0 w-full">
    @switch (activeTab()) {
      @case ('editor') {
        <div class="flex flex-col flex-1 min-h-0 w-full">
          <bloggi-post-block-editor-preview
            [post]="postResource.hasValue() ? postResource.value() : undefined"
            (editorLastMutatedOnChange)="onEditorLastMutatedOn($event)"
            class="flex flex-col flex-1 min-h-0 mx-4 mb-2"
          ></bloggi-post-block-editor-preview>
        </div>
      }
      @case ('preview') {
        <div class="animate-in fade-in slide-in-from-bottom-2 duration-300">
          <h2 class="text-2xl font-serif mb-4">Post Preview</h2>
          <p class="text-(--ink-2)">Preview content will go here...</p>
        </div>
      }
      @case ('metadata') {
        <div class="animate-in fade-in slide-in-from-bottom-2 duration-300">
          <h2 class="text-2xl font-serif mb-4">Post Metadata</h2>
          <p class="text-(--ink-2)">Metadata configuration will go here...</p>
        </div>
      }
    }
  </div>
</div>
