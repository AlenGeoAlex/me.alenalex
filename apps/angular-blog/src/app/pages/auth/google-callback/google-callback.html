<div
  id="google-oauth"
  class="flex flex-1 items-center justify-center px-4"
>
  <div class="surface-card shadow-4 border-round-2xl p-6 text-center w-full max-w-sm">
    <div class="flex justify-center mb-4">
      <p-progressSpinner
        strokeWidth="4"
        fill="transparent"
        animationDuration=".8s"
        [style]="{ width: '50px', height: '50px' }"
      ></p-progressSpinner>
    </div>

    <h2 class="text-2xl font-semibold mb-3">
      Please wait...
    </h2>

    <p class="text-base mb-2">
      We are validating your Google OAuth credentials.
    </p>

    <p class="text-sm mb-0">
      You'll be redirected shortly for OAuth.
    </p>
  </div>
</div>
