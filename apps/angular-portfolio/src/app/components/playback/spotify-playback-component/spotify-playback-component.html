<div class="flex flex-col items-center justify-center">
  @if (playback() && !isClosed()) {
    <div class="group relative bg-gray-800/60 backdrop-blur-md border border-white/10 rounded-full p-1 flex items-center gap-0 max-w-[64px] hover:max-w-sm sm:hover:max-w-md w-full shadow-[0_0_50px_rgba(0,0,0,0.5)] transition-all duration-500 ease-in-out overflow-hidden hover:gap-4 hover:px-6 hover:py-3 hover:bg-gray-800/80 hover:shadow-cyan-500/20">

      <!-- Close Button (only visible on hover) -->
      <button (click)="close(); $event.stopPropagation()"
              class="absolute top-1 right-4 text-gray-400 hover:text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10">
        <lucide-icon [img]="X" size="14"></lucide-icon>
      </button>

      <!-- Rotating Disc -->
      <div class="relative flex-shrink-0">
        <div class="w-14 h-14 sm:w-16 sm:h-16 group-hover:w-16 group-hover:h-16 sm:group-hover:w-20 sm:group-hover:h-20 rounded-full overflow-hidden border-2 border-cyan-500 animate-[spin_12s_linear_infinite] shadow-[0_0_15px_rgba(34,211,238,0.5)] transition-all duration-500">
          <img [src]="playback()?.albumArt || playback()?.itemImage" alt="Album Art" class="w-full h-full object-cover">
        </div>
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="w-3 h-3 bg-gray-900 rounded-full border border-white/20 transition-all duration-500 group-hover:w-4 group-hover:h-4"></div>
        </div>
      </div>

      <!-- Info (Expands on hover) -->
      <div class="flex-grow min-w-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-150">
        <p class="text-cyan-400 text-[10px] font-bold uppercase tracking-wider mb-0.5">Now Listening</p>
        <h3 class="text-white text-sm sm:text-base font-bold truncate">{{ playback()?.title }}</h3>
        <p class="text-gray-400 text-xs sm:text-sm truncate">{{ playback()?.artist }}</p>

        <!-- Timer & Progress -->
        <div class="mt-2 flex items-center gap-2">
          <span class="text-[10px] text-gray-500 font-mono">{{ formatTime(currentTime()) }}</span>
          <div class="flex-grow h-1 bg-gray-700 rounded-full overflow-hidden">
            <div class="h-full bg-cyan-500 transition-all duration-1000 ease-linear" [style.width.%]="progress()"></div>
          </div>
          <span class="text-[10px] text-gray-500 font-mono">{{ formatTime(playback()?.totalDuration || 0) }}</span>
        </div>
      </div>
    </div>
  } @else if (!playback() && !isClosed()) {
    <div class="group relative bg-gray-800/40 backdrop-blur-md border border-white/5 rounded-full p-1 flex items-center gap-0 max-w-[56px] hover:max-w-sm w-full opacity-60 shadow-[0_0_30px_rgba(0,0,0,0.3)] transition-all duration-500 ease-in-out overflow-hidden hover:gap-4 hover:px-6 hover:py-3 hover:opacity-100">

      <!-- Close Button -->
      <button (click)="close(); $event.stopPropagation()"
              class="absolute top-1 right-4 text-gray-400 hover:text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10">
        <lucide-icon [img]="X" size="14"></lucide-icon>
      </button>

      <div class="w-12 h-12 rounded-full bg-gray-700 flex items-center justify-center flex-shrink-0">
        <div class="w-6 h-6 border-2 border-gray-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
      <div class="opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-150">
        <p class="text-gray-400 text-xs font-medium italic whitespace-nowrap">Quietly working...</p>
      </div>
    </div>
  }
</div>
