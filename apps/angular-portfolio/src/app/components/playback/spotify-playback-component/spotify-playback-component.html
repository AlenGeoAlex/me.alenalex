<div class="flex flex-col items-center justify-center">
  @if (playback()) {
    <div class="bg-gray-800/60 backdrop-blur-md border border-white/10 rounded-full px-6 py-3 flex items-center gap-4 max-w-sm sm:max-w-md w-full shadow-[0_0_50px_rgba(0,0,0,0.5)] transition-all duration-300 hover:bg-gray-800/80 hover:shadow-cyan-500/20">

      <!-- Rotating Disc -->
      <div class="relative flex-shrink-0">
        <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full overflow-hidden border-2 border-cyan-500 animate-[spin_12s_linear_infinite] shadow-[0_0_15px_rgba(34,211,238,0.5)]">
          <img [src]="playback()?.albumArt || playback()?.itemImage" alt="Album Art" class="w-full h-full object-cover">
        </div>
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="w-4 h-4 bg-gray-900 rounded-full border border-white/20"></div>
        </div>
      </div>

      <!-- Info -->
      <div class="flex-grow min-w-0">
        <p class="text-cyan-400 text-xs font-bold uppercase tracking-wider mb-1">Now Listening</p>
        <h3 class="text-white text-sm sm:text-base font-bold truncate">{{ playback()?.title }}</h3>
        <p class="text-gray-400 text-xs sm:text-sm truncate">{{ playback()?.artist }}</p>

        <!-- Timer & Progress -->
        <div class="mt-2 flex items-center gap-2">
          <span class="text-[10px] text-gray-500 font-mono">{{ formatTime(currentTime()) }}</span>
          <div class="flex-grow h-1 bg-gray-700 rounded-full overflow-hidden">
            <div class="h-full bg-cyan-500 transition-all duration-1000 ease-linear" [style.width.%]="progress()"></div>
          </div>
          <span class="text-[10px] text-gray-500 font-mono">{{ formatTime(playback()?.totalDuration || 0) }}</span>
        </div>
      </div>
    </div>
  } @else {
    <div class="bg-gray-800/40 backdrop-blur-md border border-white/5 rounded-full px-6 py-3 flex items-center gap-4 max-w-sm w-full opacity-60 shadow-[0_0_30px_rgba(0,0,0,0.3)] transition-all duration-500">
      <div class="w-12 h-12 rounded-full bg-gray-700 flex items-center justify-center flex-shrink-0">
        <div class="w-6 h-6 border-2 border-gray-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
      <div>
        <p class="text-gray-400 text-xs font-medium italic whitespace-nowrap">Quietly working...</p>
      </div>
    </div>
  }
</div>
