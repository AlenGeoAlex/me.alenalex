<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════════════
         SEO & OPEN GRAPH
         All {{TOKEN}} values are replaced by LayoutTemplate.cs at publish time.
         Tokens listed below — if a token is not applicable for a post,
         LayoutTemplate.cs will leave the tag empty or omit it entirely.
  
         AVAILABLE TOKENS:
           {{POST_TITLE}}        — posts.title
           {{POST_EXCERPT}}      — posts.excerpt
           {{SITE_NAME}}         — env var / settings
           {{META_ROBOTS}}       — post_meta.meta_robots, default "index, follow"
           {{CANONICAL_URL}}     — post_meta.canonical_url, fallback https://{domain}/blog/{slug}
           {{OG_TITLE}}          — post_meta.og_title, fallback posts.title
           {{OG_DESCRIPTION}}    — post_meta.og_description, fallback posts.excerpt
           {{OG_IMAGE_URL}}      — post_meta.og_image_url
           {{SCHEMA_ORG_JSON}}   — post_meta.schema_org_json (raw JSON-LD blob)
           {{HEAD_INJECTIONS}}   — post_head_injections rows, injected verbatim in order
           {{POST_TAGS}}         — rendered <span class="post-tag"> elements from post_tags → tags
           {{POST_TITLE}}        — posts.title (also used in <h1>)
           {{POST_EXCERPT}}      — posts.excerpt (also used as lede paragraph)
           {{AUTHOR_NAME}}       — users.display_name
           {{AUTHOR_INITIALS}}   — derived: first letter of first + last word of display_name
           {{PUBLISHED_AT_ISO}}  — posts.published_at as ISO 8601, used in datetime attribute
           {{PUBLISHED_AT_HUMAN}}— posts.published_at formatted e.g. "14 March 2025"
           {{READ_TIME}}         — derived: sum(text_content word count) / 200, min 1
           {{POST_COVER}}        — <img> if og_image_url set, placeholder <div> if not
           {{POST_CONTENT}}      — full HTML fragment from BlockRendererRegistry.RenderAll()
           {{POST_ID}}           — posts.id (UUID), used by script.js for series API call
           {{POST_SLUG}}         — posts.slug, used by script.js for breadcrumb fallback
    ═══════════════════════════════════════════════════ -->
    <title>{{POST_TITLE}} — {{SITE_NAME}}</title>
    <meta name="description"  content="{{POST_EXCERPT}}" />
    <meta name="robots"       content="{{META_ROBOTS}}" />
    <link rel="canonical"     href="{{CANONICAL_URL}}" />

    <!-- Open Graph -->
    <meta property="og:type"        content="article" />
    <meta property="og:title"       content="{{OG_TITLE}}" />
    <meta property="og:description" content="{{OG_DESCRIPTION}}" />
    <meta property="og:url"         content="{{CANONICAL_URL}}" />
    <!-- {{OG_IMAGE_URL}} — omit this tag entirely if og_image_url is null -->
    <meta property="og:image"       content="{{OG_IMAGE_URL}}" />
    <meta property="og:site_name"   content="{{SITE_NAME}}" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="{{OG_TITLE}}" />
    <meta name="twitter:description" content="{{OG_DESCRIPTION}}" />
    <!-- {{OG_IMAGE_URL}} — omit this tag entirely if og_image_url is null -->
    <meta name="twitter:image"       content="{{OG_IMAGE_URL}}" />

    <!-- JSON-LD structured data — {{SCHEMA_ORG_JSON}} replaced by LayoutTemplate.cs -->
    <!-- omit the script tag entirely if schema_org_json is null -->
    <script type="application/ld+json">{{SCHEMA_ORG_JSON}}</script>

    <!-- Per-post <head> injections — {{HEAD_INJECTIONS}} replaced by LayoutTemplate.cs -->
    <!-- may be empty string if no post_head_injections rows exist for this post -->
    {{HEAD_INJECTIONS}}

    <!-- ═══════════════════════════════════════════════════
         FONTS
    ═══════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- ═══════════════════════════════════════════════════
         HIGHLIGHT.JS — code syntax highlighting
    ═══════════════════════════════════════════════════ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
          media="(prefers-color-scheme: light)" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
          media="(prefers-color-scheme: dark)" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>

    <!-- ═══════════════════════════════════════════════════
         TAILWIND — utility classes for layout
    ═══════════════════════════════════════════════════ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Instrument Serif', 'Georgia', 'serif'],
                        sans:  ['Geist', 'sans-serif'],
                        mono:  ['Geist Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <!-- ═══════════════════════════════════════════════════
         ALPINE JS — progressive enhancement for TOC, series, breadcrumb
    ═══════════════════════════════════════════════════ -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- ═══════════════════════════════════════════════════
         BLOG STYLES — all post and layout styles live in blog.css
    ═══════════════════════════════════════════════════ -->
    <link rel="stylesheet" href="/blog.css" />

    <!-- ═══════════════════════════════════════════════════
         DARK MODE — applied before first paint to prevent flash
    ═══════════════════════════════════════════════════ -->
    <script>
        (function () {
            const stored = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (stored === 'dark' || (!stored && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

</head>

<body>

<div class="orb orb-1" aria-hidden="true"></div>
<div class="orb orb-2" aria-hidden="true"></div>

<!-- ═══════════════════════════════════════════════════
     NAV
═══════════════════════════════════════════════════ -->
<header class="site-nav">
    <div class="site-nav-inner">
        <a href="/" class="site-logo">{{SITE_NAME}}</a>
        <nav class="nav-links">
            <a href="/"      class="nav-link">Writing</a>
            <a href="/about" class="nav-link">About</a>
            <button class="theme-toggle" onclick="toggleDark()" aria-label="Toggle dark mode">
                <span id="theme-icon">☀</span>
            </button>
        </nav>
    </div>
</header>

<!-- ═══════════════════════════════════════════════════
     PAGE LAYOUT — content + sidebar
═══════════════════════════════════════════════════ -->
<div class="page-layout">

    <!-- ── MAIN CONTENT COLUMN (2/3) ─────────────────── -->
    <main class="content-column relative z-10">

        <!-- BREADCRUMB
             Default: Blog / Post Title
             script.js upgrades to: Blog / Series Name / Post Title if series found
             The series-crumb span is hidden by default, shown by JS if series exists -->
        <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="/" class="breadcrumb-item">Blog</a>
            <span class="breadcrumb-sep">·</span>
            <!-- series crumb — hidden until JS confirms post is in a series -->
            <span id="breadcrumb-series" class="breadcrumb-item breadcrumb-series" style="display:none"></span>
            <span id="breadcrumb-series-sep" class="breadcrumb-sep" style="display:none">·</span>
            <span class="breadcrumb-item breadcrumb-current">{{POST_TITLE}}</span>
        </nav>

        <!-- POST HEADER -->
        <header class="post-header fade-1">

            <!-- Tags — {{POST_TAGS}} replaced by LayoutTemplate.cs as <span> elements -->
            <div class="post-tags">{{POST_TAGS}}</div>

            <h1 class="post-title">{{POST_TITLE}}</h1>

            <p class="post-lede">{{POST_EXCERPT}}</p>

            <div class="post-meta">
                <div class="post-meta-avatar">{{AUTHOR_INITIALS}}</div>
                <span>{{AUTHOR_NAME}}</span>
                <span class="post-meta-dot">·</span>
                <time datetime="{{PUBLISHED_AT_ISO}}">{{PUBLISHED_AT_HUMAN}}</time>
                <span class="post-meta-dot">·</span>
                <span>{{READ_TIME}} min read</span>
            </div>

            <!-- Cover image — LayoutTemplate.cs emits <img> if og_image_url is set,
                 otherwise emits the decorative placeholder div -->
            <div class="post-cover">{{POST_COVER}}</div>

        </header>

        <!-- POST BODY — {{POST_CONTENT}} replaced by BlockRendererRegistry.RenderAll() -->
        <article class="post-content fade-2" id="post-content">
            {{POST_CONTENT}}
        </article>

        <!-- SERIES NAVIGATION — next / previous within series
             Hidden by default. script.js renders this if post is part of a series. -->
        <nav class="series-nav" id="series-nav" style="display:none" aria-label="Series navigation">
            <div class="series-nav-prev" id="series-nav-prev"></div>
            <div class="series-nav-next" id="series-nav-next"></div>
        </nav>

        <!-- POST FOOTER -->
        <footer class="post-footer fade-3">
            <a href="/">← All posts</a>
            <time datetime="{{PUBLISHED_AT_ISO}}">{{PUBLISHED_AT_HUMAN}}</time>
        </footer>

    </main>

    <!-- ── SIDEBAR (1/4) ──────────────────────────────── -->
    <aside class="sidebar" id="sidebar" aria-label="Page sidebar">

        <!-- TABLE OF CONTENTS
             script.js extracts .post-heading-1, .post-heading-2, .post-heading-3
             from #post-content and builds the TOC list.
             IntersectionObserver highlights the active heading as user scrolls.
             Hidden if fewer than 2 headings found. -->
        <div class="sidebar-section" id="toc-section" style="display:none">
            <p class="sidebar-label">On this page</p>
            <nav id="toc-list" aria-label="Table of contents"></nav>
        </div>

        <!-- SERIES LIST
             script.js calls GET /api/posts/{{POST_ID}}/series
             If 404 or error → entire section stays hidden.
             If found → renders series title, episode list, highlights current post. -->
        <div class="sidebar-section" id="series-section" style="display:none">
            <p class="sidebar-label">Series</p>
            <p class="series-title" id="series-title"></p>
            <ol class="series-list" id="series-list"></ol>
        </div>

    </aside>

</div>
<script>
    const postId   = '123';
    const postSlug = '123';
    const postTitle = '123';
</script>

<!-- ═══════════════════════════════════════════════════
     GLOSSARY SCRIPT
     Fetches all terms from /api/glossary/terms and injects
     data-definition attributes into .post-glossary spans.
     Zero SEO impact — content is already fully rendered.
═══════════════════════════════════════════════════ -->
<script src="/glossary.js" defer></script>

<!-- ═══════════════════════════════════════════════════
     BLOG SCRIPT — TOC, series, breadcrumb, dark mode
═══════════════════════════════════════════════════ -->
<script src="/script.js" defer></script>

</body>
</html>
