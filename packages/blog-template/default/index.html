<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/AlenGeoAlex/me.alenalex@main/packages/blog-theme/theme-token.css" />
    <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/AlenGeoAlex/me.alenalex@main/packages/blog-template/default/blog.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.min.css" integrity="sha384-UA8juhPf75SzzAMA/4fo3yOU7sBJ0om7SCD2GHq0fZqZco6tr1UCV7nUbk9J90JM" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.min.js" integrity="sha384-Tt7wBxLKwSzFVRET4O4U9H6v8MNaQ/CjN2FMP4xFm0ErrFu6aNqoonRVW5W40iGI" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/contrib/auto-render.min.js" integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex-swap.min.css" integrity="sha384-4oq/auzzmx0i9ZQW815S9u/s+w/VYRSz/0auctaq99qhFt2YKlaMiLdXBaODJHxZ" crossorigin="anonymous">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Instrument Serif', 'Georgia', 'serif'],
                        sans:  ['Geist', 'sans-serif'],
                        mono:  ['Geist Mono', 'monospace'],
                    },
                }
            }
        }

        if (typeof lucide !== 'undefined') lucide.createIcons();
    </script>
    <script>
      (function () {
        const stored = localStorage.getItem('blog.alenalex.me-darkModePersistence');
        if (stored === 'true') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script>
        window.WebFontConfig = {
            custom: {
                families: ['KaTeX_AMS', 'KaTeX_Caligraphic:n4,n7', 'KaTeX_Fraktur:n4,n7',
                    'KaTeX_Main:n4,n7,i4,i7', 'KaTeX_Math:i4,i7', 'KaTeX_Script',
                    'KaTeX_SansSerif:n4,n7,i4', 'KaTeX_Size1', 'KaTeX_Size2', 'KaTeX_Size3',
                    'KaTeX_Size4', 'KaTeX_Typewriter'],
            },
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/webfontloader@1.6.28/webfontloader.js" integrity="sha256-4O4pS1SH31ZqrSO2A/2QJTVjTPqVe+jnYgOWUVr7EEc=" crossorigin="anonymous"></script>
</head>

<body>

<div class="orb orb-1" aria-hidden="true"></div>
<div class="orb orb-2" aria-hidden="true"></div>

<header class="site-nav">
    <div class="site-nav-inner">

        <a href="/" class="site-logo">Alen's Blog</a>

        <div class="nav-links">
            <a href="https://alenalex.me" class="nav-link" title="About">
                <i class="pi pi-info-circle"></i>
            </a>
            <a href="https://github.com/AlenGeoAlex" target="_blank" class="nav-link" title="GitHub">
                <i class="pi pi-github"></i>
            </a>
            <button class="theme-toggle" onclick="toggleDark()" aria-label="Toggle dark mode">
                <i id="theme-icon" class="pi pi-sun"></i>
            </button>
            <button class="nav-mobile-toggle" onclick="toggleMobileMenu()" aria-label="Menu">
                <i id="mobile-icon" class="pi pi-bars"></i>
            </button>
        </div>

    </div>
</header>

<div id="mobile-menu" class="mobile-menu" style="display:none">
    <div class="mobile-menu-inner">
        <a href="https://alenalex.me" class="mobile-menu-link">
            <i class="pi pi-info-circle"></i>
            <span>About</span>
        </a>
        <a href="https://github.com/AlenGeoAlex" target="_blank" class="mobile-menu-link">
            <i class="pi pi-github"></i>
            <span>GitHub</span>
        </a>
    </div>
</div>

<div class="page-layout">
    <main class="content-column relative z-10" id="main">
        <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="/" class="breadcrumb-item">Blog</a>
            <span class="breadcrumb-sep">·</span>
            <span id="breadcrumb-series" class="breadcrumb-item breadcrumb-series" style="display:none"></span>
            <span id="breadcrumb-series-sep" class="breadcrumb-sep" style="display:none">/</span>
            <span class="breadcrumb-item breadcrumb-current" id="breadcrumb-post-title"></span>
        </nav>
        <header class="post-header fade-1">
            <div class="post-tags" id="post-tags-container"></div>
            <h1 class="post-title" id="post-title"></h1>
            <p class="post-lede" id="post-excerpt"></p>
            <div class="post-meta">
                <div class="post-meta-avatar" id="author-initials"></div>
                <span id="author-name"></span>
                <span class="post-meta-dot">·</span>
                <time datetime="" id="published-at" ></time>
                <span class="post-meta-dot">·</span>
                <span id="read-time"></span>
            </div>

            <div class="post-cover" id="post-cover"></div>

        </header>

        <article class="post-content fade-2" id="post-content">
        </article>
        <nav class="series-nav" id="series-nav" style="display:none" aria-label="Series navigation">
            <div class="series-nav-prev" id="series-nav-prev"></div>
            <div class="series-nav-next" id="series-nav-next"></div>
        </nav>

        <footer class="post-footer fade-3">
            <a href="/">← All posts</a>
            <time datetime="" id="published-at-fotter"></time>
        </footer>

    </main>

    <aside class="sidebar" id="sidebar" aria-label="Page sidebar">
        <div class="sidebar-section" id="toc-section" style="display:none">
            <p class="sidebar-label">On this page</p>
            <nav id="toc-list" aria-label="Table of contents"></nav>
        </div>

        <div class="sidebar-section" id="series-section" style="display:none">
            <p class="sidebar-label">Series</p>
            <p class="series-title" id="series-title"></p>
            <ol class="series-list" id="series-list"></ol>
        </div>

    </aside>

</div>

<script src="/glossary.js" defer></script>
<script src="https://cdn.jsdelivr.net/gh/AlenGeoAlex/me.alenalex@main/packages/blog-template/default/script.js" defer></script>
</body>
</html>
